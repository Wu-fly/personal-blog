# Development Environment Configuration

spring:
  # Database Configuration for Development
  datasource:
    url: jdbc:mysql://localhost:3306/blog_system?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&rewriteBatchedStatements=true
    username: root
    password: root
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  
  # JPA Configuration for Development
  jpa:
    hibernate:
      # Use 'update' for development to auto-create/update tables
      ddl-auto: update
    # Show SQL in development
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        generate_statistics: true

# Logging Configuration for Development
logging:
  level:
    root: INFO
    com.blog: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.springframework.security: DEBUG
